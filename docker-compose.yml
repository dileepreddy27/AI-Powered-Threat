services:
  postgres:
    image: postgres:16
    container_name: threat-shield-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-threat_shield}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-threat_shield}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ml-api:
    build:
      context: ./services/ml-api
    container_name: threat-shield-ml-api
    environment:
      ML_API_HOST: ${ML_API_HOST:-0.0.0.0}
      ML_API_PORT: ${ML_API_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/threat_shield}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ./services/gateway
    container_name: threat-shield-gateway
    environment:
      GATEWAY_HOST: ${GATEWAY_HOST:-0.0.0.0}
      GATEWAY_PORT: ${GATEWAY_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/threat_shield}
      ML_API_URL: ${ML_API_URL:-http://ml-api:8000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      ml-api:
        condition: service_started

  dashboard:
    build:
      context: ./apps/dashboard
    container_name: threat-shield-dashboard
    environment:
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:4000}
      GATEWAY_INTERNAL_URL: ${GATEWAY_INTERNAL_URL:-http://gateway:4000}
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data:
